name: Build C# App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Đảm bảo có môi trường .NET để chạy lệnh restore

    - name: Restore Dependencies
      run: dotnet restore PresentationSnapshot.csproj

    - name: Build App
      run: dotnet build PresentationSnapshot.csproj -c Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SnapshotTool-Executable
        path: bin/Release/net48/ # Đường dẫn này phải khớp với TargetFramework trong csproj
